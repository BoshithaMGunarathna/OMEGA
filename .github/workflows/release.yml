name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.1)'
        required: true

# Grant necessary permissions for the entire workflow
permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Get version from tag
      id: version
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Build and Release
      run: npm run build-electron
      env:
        # Use a more permissive token or create a PAT
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Alternative: Use a Personal Access Token
        # GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    - name: Upload artifacts (backup)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: electron-builds-backup
        path: electron-dist/